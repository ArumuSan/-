<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SF機体シューティング</title>
<style>
  html, body { margin:0; padding:0; background:#05060c; overflow:hidden; height:100%; }
  #sfg-wrap { position:relative; width:100vw; height:100vh; background:#05060c; overflow:hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  #sfg-canvas { position:absolute; inset:0; width:100%; height:100%; display:block; cursor:none; }
  #sfg-hud { position:absolute; top:0; left:0; right:0; padding:16px 20px; display:flex; justify-content:space-between; align-items:flex-start; pointer-events:none; }
  #sfg-hpbar-wrap { width:180px; height:12px; background:rgba(255,255,255,0.15); border-radius:6px; overflow:hidden; }
  #sfg-hpbar { width:100%; height:100%; background:#5DCAA5; transition:width .15s; }
  .sfg-btn { pointer-events:auto; padding:12px 28px; font-size:15px; border-radius:8px; border:1px solid rgba(255,255,255,0.3); background:rgba(255,255,255,0.08); color:#e6ecf5; cursor:pointer; }
  .sfg-btn:hover { background:rgba(255,255,255,0.16); }
  #sfg-start, #sfg-over { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; background:rgba(5,6,12,0.78); text-align:center; padding:20px; }
  #sfg-over { display:none; }
</style>
</head>
<body>
<div id="sfg-wrap">
  <canvas id="sfg-canvas"></canvas>

  <div id="sfg-hud">
    <div>
      <div style="font-size:12px;color:#9fb0c8;margin-bottom:4px;">HP</div>
      <div id="sfg-hpbar-wrap"><div id="sfg-hpbar"></div></div>
    </div>
    <div style="text-align:right;">
      <div id="sfg-weapon" style="font-size:14px;color:#e6ecf5;font-weight:600;">WEAPON Lv.1</div>
      <div id="sfg-score" style="font-size:14px;color:#9fb0c8;margin-top:4px;">SCORE 0</div>
    </div>
  </div>

  <div id="sfg-start">
    <div style="font-size:22px;font-weight:600;color:#e6ecf5;">SF機体シューティング</div>
    <div style="font-size:14px;color:#9fb0c8;line-height:1.7;max-width:340px;">マウスを動かして機体を操作。自動で射撃します。<br>敵を倒すとアイテムをドロップ、拾って武器を強化しよう。</div>
    <button id="sfg-startbtn" class="sfg-btn">スタート</button>
  </div>

  <div id="sfg-over">
    <div style="font-size:22px;font-weight:600;color:#e6ecf5;">ゲームオーバー</div>
    <div id="sfg-finalscore" style="font-size:15px;color:#9fb0c8;">SCORE 0</div>
    <button id="sfg-retrybtn" class="sfg-btn">リトライ</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
function boot(){
  if(typeof THREE==='undefined'){ setTimeout(boot,50); return; }
  init();
}

function init(){
  var wrap = document.getElementById('sfg-wrap');
  var canvas = document.getElementById('sfg-canvas');
  var startScreen = document.getElementById('sfg-start');
  var overScreen = document.getElementById('sfg-over');
  var hpBar = document.getElementById('sfg-hpbar');
  var weaponText = document.getElementById('sfg-weapon');
  var scoreText = document.getElementById('sfg-score');
  var finalScoreText = document.getElementById('sfg-finalscore');

  var scene = new THREE.Scene();
  scene.background = new THREE.Color(0x05060c);
  var camera = new THREE.PerspectiveCamera(60, wrap.clientWidth/wrap.clientHeight, 0.1, 500);
  var renderer = new THREE.WebGLRenderer({canvas: canvas, antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
  renderer.setSize(wrap.clientWidth, wrap.clientHeight);

  scene.add(new THREE.AmbientLight(0x445577, 1.3));
  var dl = new THREE.DirectionalLight(0xffffff, 1.0);
  dl.position.set(5,10,6);
  scene.add(dl);

  var starCount = 1600;
  var starGeo = new THREE.BufferGeometry();
  var starPos = new Float32Array(starCount*3);
  for(var i=0;i<starCount;i++){
    starPos[i*3] = (Math.random()-0.5)*160;
    starPos[i*3+1] = (Math.random()-0.5)*90;
    starPos[i*3+2] = -Math.random()*300;
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));
  var starMat = new THREE.PointsMaterial({color:0xaabbee, size:0.6, transparent:true, opacity:0.85});
  var stars = new THREE.Points(starGeo, starMat);
  scene.add(stars);

  var ship = new THREE.Group();
  var body = new THREE.Mesh(new THREE.ConeGeometry(0.6,2.2,8), new THREE.MeshPhongMaterial({color:0x7f9ad4, shininess:60}));
  body.rotation.x = -Math.PI/2;
  ship.add(body);
  var wingMat = new THREE.MeshPhongMaterial({color:0x3c4d7a});
  var wingL = new THREE.Mesh(new THREE.BoxGeometry(1.8,0.08,0.7), wingMat);
  wingL.position.set(-1.0,0,0.3);
  ship.add(wingL);
  var wingR = wingL.clone();
  wingR.position.set(1.0,0,0.3);
  ship.add(wingR);
  var engine = new THREE.Mesh(new THREE.SphereGeometry(0.22,8,8), new THREE.MeshBasicMaterial({color:0x5DCAA5}));
  engine.position.set(0,0,1.2);
  ship.add(engine);
  ship.position.set(0,0,0);
  scene.add(ship);

  var shieldMesh = new THREE.Mesh(new THREE.SphereGeometry(1.6,12,12), new THREE.MeshBasicMaterial({color:0xEF9F27, transparent:true, opacity:0.25, wireframe:true}));
  shieldMesh.visible = false;
  scene.add(shieldMesh);

  var bulletGeo = new THREE.SphereGeometry(0.14,6,6);
  var bulletMat = new THREE.MeshBasicMaterial({color:0x85B7EB});
  var enemyBulletGeo = new THREE.SphereGeometry(0.16,6,6);
  var enemyBulletMat = new THREE.MeshBasicMaterial({color:0xE24B4A});
  var enemyGeo = new THREE.OctahedronGeometry(0.75,0);
  var dropGeo = new THREE.OctahedronGeometry(0.4,0);
  var dropMats = {
    weapon: new THREE.MeshBasicMaterial({color:0x85B7EB}),
    heal: new THREE.MeshBasicMaterial({color:0x97C459}),
    shield: new THREE.MeshBasicMaterial({color:0xEF9F27}),
    score: new THREE.MeshBasicMaterial({color:0xAFA9EC})
  };

  var state = {};
  function resetState(){
    state = {
      hp:100, maxHp:100, weaponLevel:1, score:0,
      targetX:0, targetY:0,
      playerBullets:[], enemyBullets:[], enemies:[], drops:[], explosions:[],
      fireTimer:0, spawnTimer:1.2, elapsed:0,
      invincible:false, invincibleTimer:0,
      shieldActive:false, shieldTimer:0,
      running:false
    };
    ship.position.set(0,0,0);
    ship.rotation.set(0,0,0);
    ship.visible = true;
    shieldMesh.visible = false;
  }
  resetState();

  function onMove(clientX, clientY){
    var rect = wrap.getBoundingClientRect();
    var nx = ((clientX-rect.left)/rect.width)*2-1;
    var ny = ((clientY-rect.top)/rect.height)*2-1;
    state.targetX = THREE.MathUtils.clamp(nx*7, -7,7);
    state.targetY = THREE.MathUtils.clamp(-ny*4, -4,4);
  }
  wrap.addEventListener('mousemove', function(e){ onMove(e.clientX, e.clientY); });
  wrap.addEventListener('touchmove', function(e){
    if(e.touches && e.touches[0]){ onMove(e.touches[0].clientX, e.touches[0].clientY); }
    e.preventDefault();
  }, {passive:false});

  function fireInterval(){ return Math.max(0.16, 0.42 - (state.weaponLevel-1)*0.05); }
  var patterns = {
    1:[0], 2:[-0.14,0.14], 3:[-0.24,0,0.24], 4:[-0.3,-0.1,0.1,0.3], 5:[-0.4,-0.2,0,0.2,0.4]
  };
  function firePlayerBullets(){
    var lvl = Math.min(state.weaponLevel,5);
    var dmg = 8 + (lvl-1)*4;
    patterns[lvl].forEach(function(a){
      var m = new THREE.Mesh(bulletGeo, bulletMat);
      m.position.copy(ship.position);
      m.position.z -= 1.4;
      scene.add(m);
      state.playerBullets.push({mesh:m, vx:Math.sin(a)*22, vz:-95, dmg:dmg});
    });
  }

  function spawnEnemy(){
    var x = (Math.random()-0.5)*11;
    var y = (Math.random()-0.5)*6.5;
    var m = new THREE.Mesh(enemyGeo, new THREE.MeshPhongMaterial({color:0xD85A30}));
    m.position.set(x,y,-140);
    scene.add(m);
    var hp = 20 + Math.floor(state.elapsed/9)*5;
    state.enemies.push({mesh:m, hp:hp, maxHp:hp, speed:13+Math.random()*5+Math.min(state.elapsed/6,10), isShooter:Math.random()<0.5, fireTimer:1+Math.random()*2});
  }

  function fireEnemyBullet(pos){
    var dir = new THREE.Vector3().subVectors(ship.position,pos).normalize();
    var m = new THREE.Mesh(enemyBulletGeo, enemyBulletMat);
    m.position.copy(pos);
    scene.add(m);
    state.enemyBullets.push({mesh:m, dir:dir, speed:42});
  }

  function explode(pos){
    var m = new THREE.Mesh(new THREE.SphereGeometry(0.5,8,8), new THREE.MeshBasicMaterial({color:0xF0997B, transparent:true, opacity:0.9}));
    m.position.copy(pos);
    scene.add(m);
    state.explosions.push({mesh:m, life:0.4, total:0.4});
  }

  function spawnDrop(pos){
    var roll = Math.random();
    var type = roll<0.45 ? 'weapon' : roll<0.7 ? 'heal' : roll<0.85 ? 'shield' : 'score';
    var m = new THREE.Mesh(dropGeo, dropMats[type]);
    m.position.copy(pos);
    scene.add(m);
    state.drops.push({mesh:m, type:type});
  }

  function applyDrop(type){
    if(type==='weapon'){ state.weaponLevel = Math.min(5, state.weaponLevel+1); }
    else if(type==='heal'){ state.hp = Math.min(state.maxHp, state.hp+25); }
    else if(type==='shield'){ state.shieldActive = true; state.shieldTimer = 4; shieldMesh.visible = true; }
    else if(type==='score'){ state.score += 50; }
    updateUI();
  }

  function damagePlayer(amount){
    if(state.invincible || state.shieldActive) return;
    state.hp -= amount;
    state.invincible = true;
    state.invincibleTimer = 1.0;
    if(state.hp<=0){ state.hp=0; gameOver(); }
    updateUI();
  }

  function updateUI(){
    hpBar.style.width = Math.max(0,(state.hp/state.maxHp*100))+'%';
    hpBar.style.background = state.hp/state.maxHp < 0.3 ? '#E24B4A' : (state.hp/state.maxHp < 0.6 ? '#EF9F27' : '#5DCAA5');
    weaponText.textContent = 'WEAPON Lv.'+state.weaponLevel + (state.shieldActive ? ' / SHIELD' : '');
    scoreText.textContent = 'SCORE '+state.score;
  }

  function gameOver(){
    state.running = false;
    finalScoreText.textContent = 'SCORE '+state.score;
    overScreen.style.display = 'flex';
  }

  function clearScene(){
    state.playerBullets.forEach(function(b){scene.remove(b.mesh);});
    state.enemyBullets.forEach(function(b){scene.remove(b.mesh);});
    state.enemies.forEach(function(e){scene.remove(e.mesh);});
    state.drops.forEach(function(d){scene.remove(d.mesh);});
    state.explosions.forEach(function(x){scene.remove(x.mesh);});
  }

  document.getElementById('sfg-startbtn').addEventListener('click', function(){
    startScreen.style.display = 'none';
    resetState();
    state.running = true;
  });
  document.getElementById('sfg-retrybtn').addEventListener('click', function(){
    clearScene();
    resetState();
    overScreen.style.display = 'none';
    state.running = true;
  });

  var clock = new THREE.Clock();
  function animate(){
    requestAnimationFrame(animate);
    var delta = Math.min(clock.getDelta(), 0.05);

    var posAttr = starGeo.attributes.position.array;
    for(var i=0;i<starCount;i++){
      posAttr[i*3+2] += 26*delta;
      if(posAttr[i*3+2] > 10){
        posAttr[i*3+2] = -300;
        posAttr[i*3] = (Math.random()-0.5)*160;
        posAttr[i*3+1] = (Math.random()-0.5)*90;
      }
    }
    starGeo.attributes.position.needsUpdate = true;

    if(state.running){
      state.elapsed += delta;

      ship.position.x += (state.targetX - ship.position.x)*0.12;
      ship.position.y += (state.targetY - ship.position.y)*0.12;
      ship.rotation.z = THREE.MathUtils.lerp(ship.rotation.z, -(state.targetX-ship.position.x)*0.3, 0.15);
      ship.rotation.y = THREE.MathUtils.lerp(ship.rotation.y, (state.targetX-ship.position.x)*0.06, 0.15);

      if(state.invincible){
        state.invincibleTimer -= delta;
        ship.visible = Math.floor(state.elapsed*10)%2===0;
        if(state.invincibleTimer<=0){ state.invincible=false; ship.visible=true; }
      }
      if(state.shieldActive){
        state.shieldTimer -= delta;
        shieldMesh.position.copy(ship.position);
        shieldMesh.rotation.y += delta;
        if(state.shieldTimer<=0){ state.shieldActive=false; shieldMesh.visible=false; updateUI(); }
      }

      state.fireTimer -= delta;
      if(state.fireTimer<=0){ firePlayerBullets(); state.fireTimer = fireInterval(); }

      state.spawnTimer -= delta;
      if(state.spawnTimer<=0){ spawnEnemy(); state.spawnTimer = Math.max(0.55, 1.7 - state.elapsed*0.008); }

      for(var pb=state.playerBullets.length-1; pb>=0; pb--){
        var b = state.playerBullets[pb];
        b.mesh.position.x += b.vx*delta;
        b.mesh.position.z += b.vz*delta;
        var hit = false;
        if(b.mesh.position.z < -160){ scene.remove(b.mesh); state.playerBullets.splice(pb,1); continue; }
        for(var ei=state.enemies.length-1; ei>=0; ei--){
          var en = state.enemies[ei];
          if(b.mesh.position.distanceTo(en.mesh.position) < 2.4){
            en.hp -= b.dmg;
            scene.remove(b.mesh);
            state.playerBullets.splice(pb,1);
            hit = true;
            if(en.hp<=0){
              explode(en.mesh.position);
              state.score += 10;
              updateUI();
              if(Math.random()<0.45) spawnDrop(en.mesh.position.clone());
              scene.remove(en.mesh);
              state.enemies.splice(ei,1);
            }
            break;
          }
        }
        if(hit) continue;
      }

      for(var ee=state.enemies.length-1; ee>=0; ee--){
        var e = state.enemies[ee];
        e.mesh.position.z += e.speed*delta;
        e.mesh.position.x += Math.sin(state.elapsed*1.6 + e.mesh.position.z*0.1)*0.5*delta;
        e.mesh.rotation.y += delta*1.5;
        var d = e.mesh.position.distanceTo(ship.position);
        if(d < 2.6){
          damagePlayer(25);
          explode(e.mesh.position);
          scene.remove(e.mesh);
          state.enemies.splice(ee,1);
          continue;
        }
        if(e.mesh.position.z > ship.position.z + 6){
          scene.remove(e.mesh);
          state.enemies.splice(ee,1);
          continue;
        }
        if(e.isShooter){
          e.fireTimer -= delta;
          if(e.fireTimer<=0){ fireEnemyBullet(e.mesh.position); e.fireTimer = 1.4+Math.random()*1.4; }
        }
      }

      for(var eb=state.enemyBullets.length-1; eb>=0; eb--){
        var bb = state.enemyBullets[eb];
        bb.mesh.position.addScaledVector(bb.dir, bb.speed*delta);
        if(bb.mesh.position.distanceTo(ship.position) < 1.4){
          damagePlayer(10);
          scene.remove(bb.mesh);
          state.enemyBullets.splice(eb,1);
          continue;
        }
        if(bb.mesh.position.z > ship.position.z + 12 || bb.mesh.position.z < -170){
          scene.remove(bb.mesh);
          state.enemyBullets.splice(eb,1);
        }
      }

      for(var dd=state.drops.length-1; dd>=0; dd--){
        var dr = state.drops[dd];
        dr.mesh.position.z += 11*delta;
        dr.mesh.rotation.x += delta*2;
        dr.mesh.rotation.y += delta*3;
        if(dr.mesh.position.distanceTo(ship.position) < 2.7){
          applyDrop(dr.type);
          scene.remove(dr.mesh);
          state.drops.splice(dd,1);
          continue;
        }
        if(dr.mesh.position.z > ship.position.z + 8){
          scene.remove(dr.mesh);
          state.drops.splice(dd,1);
        }
      }

      for(var xi=state.explosions.length-1; xi>=0; xi--){
        var ex = state.explosions[xi];
        ex.life -= delta;
        var s = 1 + (ex.total-ex.life)*8;
        ex.mesh.scale.set(s,s,s);
        ex.mesh.material.opacity = Math.max(0, ex.life/ex.total*0.9);
        if(ex.life<=0){ scene.remove(ex.mesh); state.explosions.splice(xi,1); }
      }
    }

    camera.position.set(ship.position.x*0.3, ship.position.y*0.3+3, ship.position.z+9);
    camera.lookAt(ship.position.x*0.3, ship.position.y*0.3, ship.position.z-30);

    renderer.render(scene, camera);
  }

  function handleResize(){
    var w = wrap.clientWidth, h = wrap.clientHeight;
    if(w>0 && h>0){
      camera.aspect = w/h;
      camera.updateProjectionMatrix();
      renderer.setSize(w,h);
    }
  }
  window.addEventListener('resize', handleResize);

  animate();
}
boot();
})();
</script>
</body>
</html>
