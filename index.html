<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>クリーンランナー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#150a2e;
    --bg-mid:#3a1257;
    --horizon:#ff6fae;
    --cyan:#2ee6d6;
    --magenta:#ff2e88;
    --amber:#ffb347;
    --surface:#1f1440;
    --surface-2:#291a55;
    --text:#f5f0ff;
    --text-dim:#b9a9e6;
  }
  *{
    box-sizing:border-box;-webkit-tap-highlight-color:transparent;
    -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
    -webkit-touch-callout:none;
  }
  html,body{
    margin:0;padding:0;height:100%;overflow:hidden;
    background:var(--bg-deep);
    font-family:'Noto Sans JP',sans-serif;
    color:var(--text);
    touch-action:none;
    overscroll-behavior:none;
    -webkit-user-drag:none;
  }
  #app{
    position:fixed;inset:0;
    display:flex;flex-direction:column;
    height:100%;
  }
  #stage{
    position:relative;
    flex:1 1 auto;
    min-height:0;
    overflow:hidden;
  }
  canvas{
    display:block;
    width:100%;height:100%;
    touch-action:none;
  }

  /* ---- HUD ---- */
  input, textarea{
    -webkit-user-select:text;-moz-user-select:text;-ms-user-select:text;user-select:text;
    -webkit-touch-callout:default;
  }
  #hud{
    position:absolute;top:0;left:0;right:0;
    display:flex;justify-content:space-between;align-items:flex-start;
    padding:14px 16px;
    pointer-events:none;
    z-index:5;
  }
  .led{
    font-family:'Press Start 2P',monospace;
    font-size:20px;
    color:var(--cyan);
    text-shadow:0 0 6px rgba(46,230,214,.9), 0 0 16px rgba(46,230,214,.5);
    background:rgba(21,10,46,.55);
    border:1px solid rgba(46,230,214,.4);
    border-radius:8px;
    padding:8px 12px;
    letter-spacing:1px;
    position:relative;
    overflow:hidden;
  }
  .led::after{
    content:"";
    position:absolute;inset:0;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,.05) 0px, rgba(255,255,255,.05) 1px, transparent 1px, transparent 3px);
    pointer-events:none;
  }
  .led .lbl{font-size:9px;color:var(--text-dim);display:block;margin-bottom:4px;letter-spacing:2px;}
  #best-chip{
    font-family:'Press Start 2P',monospace;
    font-size:11px;color:var(--amber);
    background:rgba(21,10,46,.55);
    border:1px solid rgba(255,179,71,.4);
    border-radius:8px;
    padding:8px 10px;
    text-align:right;
  }
  #best-chip .lbl{font-size:9px;color:var(--text-dim);display:block;margin-bottom:4px;letter-spacing:2px;}
  #hp-chip{
    background:rgba(21,10,46,.55);
    border:1px solid rgba(255,90,120,.4);
    border-radius:8px;
    padding:8px 10px;
    text-align:center;
  }
  #hp-chip .lbl{font-size:9px;color:var(--text-dim);display:block;margin-bottom:4px;letter-spacing:2px;}
  #hp-chip .hearts{font-size:16px;letter-spacing:2px;}
  #hp-chip .heart-lost{opacity:.25;filter:grayscale(1);}

  /* ---- Overlays ---- */
  .overlay{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    padding:24px;
    z-index:10;
    background:radial-gradient(ellipse at 50% 30%, rgba(58,18,87,.55), rgba(21,10,46,.92));
    backdrop-filter:blur(2px);
  }
  .hidden{display:none !important;}
  .panel{
    width:100%;max-width:380px;
    background:linear-gradient(180deg, var(--surface), var(--surface-2));
    border:1px solid rgba(46,230,214,.35);
    border-radius:18px;
    padding:22px 20px 20px;
    box-shadow:0 0 0 1px rgba(0,0,0,.3), 0 20px 60px rgba(0,0,0,.5), 0 0 40px rgba(46,230,214,.08);
    max-height:92%;
    overflow-y:auto;
  }
  .title-main{
    font-family:'Press Start 2P',monospace;
    font-size:26px;
    text-align:center;
    color:var(--cyan);
    text-shadow:0 0 10px rgba(46,230,214,.8), 0 0 30px rgba(255,111,174,.4);
    margin:6px 0 4px;
    letter-spacing:1px;
  }
  .title-sub{
    text-align:center;
    color:var(--text-dim);
    font-size:12.5px;
    margin:0 0 18px;
    letter-spacing:1px;
  }
  .howto{
    display:flex;gap:10px;margin-bottom:18px;
  }
  .howto div{
    flex:1;
    background:rgba(0,0,0,.22);
    border:1px solid rgba(255,255,255,.08);
    border-radius:12px;
    padding:12px 8px;
    text-align:center;
    font-size:12px;
    color:var(--text-dim);
  }
  .howto .ic{font-size:22px;display:block;margin-bottom:6px;}
  .howto b{color:var(--text);display:block;margin-bottom:2px;font-size:12.5px;}

  .btn{
    display:block;width:100%;
    border:none;border-radius:12px;
    padding:14px;
    font-family:'Noto Sans JP',sans-serif;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    text-align:center;
    letter-spacing:.5px;
  }
  .btn-primary{
    background:linear-gradient(180deg, var(--cyan), #1cb3a6);
    color:#0b2622;
    box-shadow:0 6px 0 #158d82, 0 8px 20px rgba(46,230,214,.35);
    margin-bottom:10px;
  }
  .btn-primary:active{transform:translateY(4px);box-shadow:0 2px 0 #158d82;}
  .btn-secondary{
    background:rgba(255,255,255,.06);
    color:var(--text);
    border:1px solid rgba(255,255,255,.18);
    margin-bottom:10px;
  }
  .btn-share{
    background:linear-gradient(180deg,#1d9bf0,#0d7dd4);
    color:#fff;
    box-shadow:0 6px 0 #095fa3, 0 8px 20px rgba(29,155,240,.35);
    margin-bottom:10px;
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .btn-share:active{transform:translateY(4px);box-shadow:0 2px 0 #095fa3;}

  .divider{
    display:flex;align-items:center;gap:10px;
    color:var(--text-dim);font-size:11px;
    margin:16px 0 10px;
  }
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:rgba(255,255,255,.15);}

  .board{list-style:none;margin:0;padding:0;}
  .board li{
    display:flex;align-items:center;gap:10px;
    padding:8px 6px;
    border-bottom:1px solid rgba(255,255,255,.06);
    font-size:13.5px;
  }
  .board li:last-child{border-bottom:none;}
  .rank{
    font-family:'Press Start 2P',monospace;
    font-size:11px;color:var(--amber);
    width:26px;flex:none;
  }
  .board li:nth-child(1) .rank{color:#ffd76a;}
  .board li:nth-child(2) .rank{color:#d7d7e8;}
  .board li:nth-child(3) .rank{color:#e0a06a;}
  .bname{flex:1;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bscore{
    font-family:'Press Start 2P',monospace;
    font-size:12px;color:var(--cyan);
  }
  .board-empty{color:var(--text-dim);font-size:12.5px;text-align:center;padding:14px 0;}

  .result-score{
    text-align:center;margin:6px 0 4px;
  }
  .result-score .num{
    font-family:'Press Start 2P',monospace;
    font-size:40px;color:var(--magenta);
    text-shadow:0 0 12px rgba(255,46,136,.8);
    display:block;
  }
  .result-score .unit{font-size:11.5px;color:var(--text-dim);letter-spacing:2px;}
  .newbest{
    text-align:center;color:var(--amber);
    font-size:12px;margin:2px 0 14px;letter-spacing:1px;
  }

  #name-row{
    display:flex;gap:8px;margin-bottom:14px;
  }
  #name-input{
    flex:1;min-width:0;
    background:rgba(0,0,0,.28);
    border:1px solid rgba(255,255,255,.18);
    border-radius:10px;
    padding:11px 12px;
    color:var(--text);
    font-size:14px;
    font-family:'Noto Sans JP',sans-serif;
  }
  #name-input:focus{outline:1px solid var(--cyan);}
  #submit-score-btn{
    flex:none;
    background:var(--cyan);
    color:#0b2622;
    border:none;border-radius:10px;
    padding:0 16px;
    font-weight:700;font-size:13.5px;
    cursor:pointer;
  }
  #submit-status{
    font-size:11.5px;color:var(--text-dim);
    text-align:center;margin:-6px 0 12px;min-height:14px;
  }

  /* ---- Ad banner ---- */
  #ad-banner{
    flex:none;
    height:64px;
    background:#0d0620;
    border-top:1px solid rgba(46,230,214,.25);
    display:flex;align-items:center;justify-content:center;
    gap:10px;
    color:var(--text-dim);
    font-size:11px;
    letter-spacing:2px;
  }
  #ad-banner .adtag{
    font-family:'Press Start 2P',monospace;
    font-size:9px;color:var(--text-dim);
    border:1px solid rgba(255,255,255,.2);
    border-radius:4px;padding:3px 6px;
  }

  @media (max-width:360px){
    .title-main{font-size:21px;}
    .led{font-size:16px;}
  }
</style>
</head>
<body>
<div id="app">
  <div id="stage">
    <canvas id="game"></canvas>

    <div id="hud">
      <div class="led"><span class="lbl">SCORE</span><span id="score-val">0</span><span style="font-size:11px;">m</span></div>
      <div id="hp-chip"><span class="lbl">HP</span><span class="hearts" id="hp-hearts">❤️❤️❤️</span></div>
      <div id="best-chip"><span class="lbl">BEST</span><span id="best-val">0</span><span style="font-size:9px;">m</span></div>
    </div>

    <!-- START SCREEN -->
    <div id="start-screen" class="overlay">
      <div class="panel">
        <div class="title-main">クリーン<br>ランナー</div>
        <p class="title-sub">走って、跳んで、かわして、稼げ。</p>
        <div class="howto">
          <div><span class="ic">👆</span><b>タップ</b>ジャンプ（2段まで）</div>
          <div><span class="ic">↔️</span><b>スライド</b>横移動</div>
          <div><span class="ic">💀</span><b>接触で</b>ゲームオーバー</div>
        </div>
        <button class="btn btn-primary" id="start-btn">タップしてスタート</button>
        <div class="divider">RANKING</div>
        <ul class="board" id="start-board"><li class="board-empty">読み込み中...</li></ul>
      </div>
    </div>

    <!-- GAME OVER SCREEN -->
    <div id="gameover-screen" class="overlay hidden">
      <div class="panel">
        <div class="title-main" style="font-size:20px;color:var(--magenta);text-shadow:0 0 10px rgba(255,46,136,.8);">GAME OVER</div>
        <div class="result-score">
          <span class="num" id="final-score">0</span>
          <span class="unit">METERS</span>
        </div>
        <div class="newbest hidden" id="newbest-tag">🏆 自己ベスト更新！</div>

        <div id="name-row">
          <input id="name-input" maxlength="10" placeholder="なまえ（10文字まで）">
          <button id="submit-score-btn">登録</button>
        </div>
        <div id="submit-status"></div>

        <button class="btn btn-share" id="share-btn">
          𝕏 で結果をシェア
        </button>
        <button class="btn btn-primary" id="retry-btn">もう一度あそぶ</button>

        <div class="divider">RANKING TOP 10</div>
        <ul class="board" id="gameover-board"><li class="board-empty">読み込み中...</li></ul>
      </div>
    </div>
  </div>

  <div id="ad-banner">
    <span class="adtag">AD</span>
    <span>広告スペース（300×50 相当）</span>
  </div>
</div>

  // ---------------------------------------------------------------
  // Canvas / sizing
  // ---------------------------------------------------------------
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const stage = document.getElementById('stage');
  let W = 0, H = 0, DPR = 1;

  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = stage.clientWidth;
    H = stage.clientHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
    groundY = H * 0.74;
  }
  let groundY = 0;
  window.addEventListener('resize', resize);

  // ---------------------------------------------------------------
  // Storage helpers (persistent, ONLINE shared leaderboard)
  // ---------------------------------------------------------------
  // This uses jsonblob.com, a free, no-signup JSON storage service, so that
  // every player who opens this file competes on the SAME ranking.
  //
  // ONE-TIME SETUP: leave ONLINE_BOARD_ID empty and open the game once with
  // an internet connection. The game will automatically create a shared
  // board and print its ID to the browser console (and show it briefly on
  // screen). Copy that ID into ONLINE_BOARD_ID below and re-save this file
  // so every future player (and every device) shares the exact same board.
  // Until that's done, the game still works: it falls back to a board ID
  // cached in this browser's localStorage, which is shared across sessions
  // on this device/browser but not yet across other players.
  const ONLINE_BOARD_ID = ''; // <-- paste the generated ID here to lock in a shared board
  const JSONBLOB_BASE = 'https://jsonblob.com/api/jsonBlob';

  const LB_KEY = 'clean_runner_leaderboard_v1';
  const NAME_KEY = 'clean_runner_name';
  const BEST_KEY = 'clean_runner_best';
  const BOARD_ID_KEY = 'clean_runner_board_id';

  let onlineBoardId = ONLINE_BOARD_ID || null;
  let onlineReady = false;
  let announcedBoardId = false;

  function lsGet(key){ try{ return window.localStorage.getItem(key); }catch(e){ return null; } }
  function lsSet(key, val){ try{ window.localStorage.setItem(key, val); }catch(e){} }

  async function ensureOnlineBoard(){
    if(onlineBoardId) return onlineBoardId;
    const cached = lsGet(BOARD_ID_KEY);
    if(cached){ onlineBoardId = cached; return onlineBoardId; }
    try{
      const res = await fetch(JSONBLOB_BASE, {
        method: 'POST',
        headers: {'Content-Type':'application/json', 'Accept':'application/json'},
        body: JSON.stringify([])
      });
      const loc = res.headers.get('Location') || '';
      const id = loc.split('/').pop();
      if(id){
        onlineBoardId = id;
        lsSet(BOARD_ID_KEY, id);
        if(!announcedBoardId){
          announcedBoardId = true;
          console.info('[クリーンランナー] 共有ランキングを新規作成しました。全員で共有するには、このIDを ONLINE_BOARD_ID に設定してください: ' + id);
          showOnlineSetupNotice(id);
        }
      }
      return onlineBoardId;
    }catch(e){
      return null;
    }
  }

  function showOnlineSetupNotice(id){
    try{
      const el = document.createElement('div');
      el.textContent = '初回セットアップ: 共有ランキングIDを作成しました。開発者はこのIDをコードに設定してください → ' + id;
      el.style.cssText = 'position:fixed;left:8px;right:8px;bottom:72px;z-index:50;background:rgba(21,10,46,.92);color:#2ee6d6;font-size:11px;padding:8px 10px;border-radius:8px;border:1px solid rgba(46,230,214,.4);word-break:break-all;';
      document.body.appendChild(el);
      setTimeout(() => { el.remove(); }, 12000);
    }catch(e){}
  }

  async function loadLeaderboard(){
    // 1) try the online shared board
    try{
      const id = await ensureOnlineBoard();
      if(id){
        const res = await fetch(JSONBLOB_BASE + '/' + id, {headers:{'Accept':'application/json'}});
        if(res.ok){
          const arr = await res.json();
          onlineReady = true;
          if(Array.isArray(arr)) return arr;
        }
      }
    }catch(e){ /* offline or blocked: fall through */ }
    onlineReady = false;
    // 2) fall back to window.storage (works when hosted inside a Claude artifact)
    try{
      const res = await window.storage.get(LB_KEY, true);
      if(res){
        const arr = JSON.parse(res.value);
        if(Array.isArray(arr)) return arr;
      }
    }catch(e){}
    // 3) fall back to this browser's local storage (device-only)
    try{
      const raw = lsGet(LB_KEY);
      if(raw){
        const arr = JSON.parse(raw);
        if(Array.isArray(arr)) return arr;
      }
    }catch(e){}
    return [];
  }

  async function saveLeaderboard(list){
    let ok = false;
    try{
      const id = await ensureOnlineBoard();
      if(id){
        const res = await fetch(JSONBLOB_BASE + '/' + id, {
          method: 'PUT',
          headers: {'Content-Type':'application/json', 'Accept':'application/json'},
          body: JSON.stringify(list)
        });
        if(res.ok){ ok = true; onlineReady = true; }
      }
    }catch(e){}
    try{ await window.storage.set(LB_KEY, JSON.stringify(list), true); }catch(e){}
    lsSet(LB_KEY, JSON.stringify(list));
    return ok;
  }

  async function submitScore(name, score){
    let list = await loadLeaderboard();
    list.push({ name: name || '名無しさん', score: score, ts: Date.now() });
    list.sort((a,b) => b.score - a.score);
    list = list.slice(0, 20);
    await saveLeaderboard(list);
    return list;
  }

  let memCache = {};
  async function loadPersonal(){
    memCache.name = lsGet(NAME_KEY) || '';
    memCache.best = parseInt(lsGet(BEST_KEY), 10) || 0;
    try{
      const n = await window.storage.get(NAME_KEY, false);
      if(n && n.value) memCache.name = n.value;
    }catch(e){}
    try{
      const b = await window.storage.get(BEST_KEY, false);
      if(b) memCache.best = Math.max(memCache.best, parseInt(b.value, 10) || 0);
    }catch(e){}
  }
  async function savePersonalName(name){
    memCache.name = name;
    lsSet(NAME_KEY, name);
    try{ await window.storage.set(NAME_KEY, name, false); }catch(e){}
  }
  async function savePersonalBest(score){
    memCache.best = score;
    lsSet(BEST_KEY, String(score));
    try{ await window.storage.set(BEST_KEY, String(score), false); }catch(e){}
  }


  function renderBoard(el, list, highlightTs){
    if(!list || list.length === 0){
      el.innerHTML = '<li class="board-empty">まだ記録がありません。最初の記録を作ろう！</li>';
      return;
    }
    el.innerHTML = list.slice(0,10).map((e,i) => {
      const mark = (highlightTs && e.ts === highlightTs) ? 'style="color:var(--amber)"' : '';
      const safeName = (e.name || '名無しさん').toString().slice(0,12);
      return '<li><span class="rank">'+(i+1)+'</span><span class="bname" '+mark+'>'+escapeHtml(safeName)+'</span><span class="bscore">'+e.score+'m</span></li>';
    }).join('');
  }
  function escapeHtml(s){
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ---------------------------------------------------------------
  // Game constants
  // ---------------------------------------------------------------
  const GRAVITY = 2500;         // px/s^2
  const JUMP_VELOCITY = -760;   // px/s
  const PLAYER_W = 56, PLAYER_H = 58; // sprite aspect ~360:373
  const BASE_SPEED = 230;       // px/s world scroll speed at start
  const MAX_SPEED = 620;

  // ---------------------------------------------------------------
  // Game state
  // ---------------------------------------------------------------
  let state = 'start'; // start | playing | dead
  let player, obstacles, particles;
  let distance = 0;      // internal distance accumulator
  let scrollSpeed = BASE_SPEED;
  let spawnTimer = 0;
  let elapsed = 0;
  let dragging = false;
  let targetX = 0;
  let dragLastX = 0;
  let fallY0 = null;
  let bgOffset = 0;
  let flashTimer = 0;
  let sparkleTimer = 0;
  const MAX_HP = 3;
  let hp = MAX_HP;
  let invulnTimer = 0;

  function resetGame(){
    player = {
      x: 90, y: 0, vy: 0, w: PLAYER_W, h: PLAYER_H,
      grounded: true, squash: 0, falling: false, jumpsUsed: 0
    };
    player.y = groundY - PLAYER_H;
    targetX = player.x;
    obstacles = [];
    particles = [];
    distance = 0;
    scrollSpeed = BASE_SPEED;
    spawnTimer = 0.8;
    elapsed = 0;
    fallY0 = null;
    flashTimer = 0;
    sparkleTimer = 0;
    hp = MAX_HP;
    invulnTimer = 0;
    updateHpUI();
  }

  function updateHpUI(){
    let s = '';
    for(let i=0;i<MAX_HP;i++){
      s += (i < hp) ? '❤️' : '<span class="heart-lost">❤️</span>';
    }
    hpHeartsEl.innerHTML = s;
  }

  function takeDamage(){
    if(invulnTimer > 0 || state !== 'playing') return;
    hp -= 1;
    invulnTimer = 1.2;
    flashTimer = 0.4;
    updateHpUI();
    spawnParticles(player.x+player.w/2, player.y+player.h/2, 14, 'hit');
    if(hp <= 0){
      triggerGameOver();
    }
  }

  function currentScore(){
    return Math.floor(distance / 10);
  }

  function difficultyStage(score){
    if(score < 120) return 0;      // spikes only, gentle
    if(score < 320) return 1;      // + pits
    if(score < 650) return 2;      // + flying enemies
    return 3;                      // + ground enemies, fast
  }

  // ---------------------------------------------------------------
  // Input
  // ---------------------------------------------------------------
  const MAX_JUMPS = 2;
  function jump(){
    if(state !== 'playing') return;
    if(player.grounded){
      player.vy = JUMP_VELOCITY;
      player.grounded = false;
      player.jumpsUsed = 1;
      player.squash = 6;
      spawnParticles(player.x + player.w/2, groundY, 6, 'jump');
    } else if((player.jumpsUsed || 0) < MAX_JUMPS){
      player.vy = JUMP_VELOCITY * 0.88; // slightly gentler second jump, mid-air
      player.jumpsUsed = (player.jumpsUsed || 0) + 1;
      player.squash = 6;
      spawnParticles(player.x + player.w/2, player.y + player.h, 8, 'jump');
    }
  }
  function pointerToLocal(e){
    const r = canvas.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
    const cy = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
    return {x:cx, y:cy};
  }
  function onDown(e){
    e.preventDefault();
    if(state === 'start'){ beginGame(); return; }
    if(state === 'dead'){ return; }
    if(state !== 'playing') return;
    const p = pointerToLocal(e);
    dragging = true;
    dragLastX = p.x;
    jump();
  }
  function onMove(e){
    if(!dragging || state !== 'playing') return;
    e.preventDefault();
    const p = pointerToLocal(e);
    const delta = p.x - dragLastX;
    targetX += delta;
    dragLastX = p.x;
  }
  function onUp(e){
    dragging = false;
  }
  canvas.addEventListener('pointerdown', onDown);
  // extra safety net: some mobile browsers still show a selection/callout
  // popup on long-press even with CSS user-select:none, so block it explicitly
  document.addEventListener('contextmenu', (e) => {
    const tag = e.target.tagName;
    if(tag !== 'INPUT' && tag !== 'TEXTAREA') e.preventDefault();
  });
  document.addEventListener('selectstart', (e) => {
    const tag = e.target.tagName;
    if(tag !== 'INPUT' && tag !== 'TEXTAREA') e.preventDefault();
  });
  canvas.addEventListener('contextmenu', (e) => e.preventDefault());
  canvas.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup', onUp);
  window.addEventListener('keydown', (e)=>{
    if(e.code === 'Space' || e.code === 'ArrowUp'){ e.preventDefault(); if(state==='start'){beginGame();} else {jump();} }
    if(e.code === 'ArrowLeft'){ targetX -= 40; }
    if(e.code === 'ArrowRight'){ targetX += 40; }
  });

  // ---------------------------------------------------------------
  // Spawning
  // ---------------------------------------------------------------
  function spawnObstacle(){
    const score = currentScore();
    const stage = difficultyStage(score);
    const roll = Math.random();
    const playMinX = W * 0.5; // spawn ahead of player's typical zone

    if(stage === 0){
      spawnSpike();
    } else if(stage === 1){
      if(roll < 0.55) spawnSpike();
      else spawnPit();
    } else if(stage === 2){
      if(roll < 0.4) spawnSpike();
      else if(roll < 0.7) spawnPit();
      else spawnFlyer();
    } else {
      if(roll < 0.3) spawnSpike();
      else if(roll < 0.55) spawnPit();
      else if(roll < 0.8) spawnFlyer();
      else spawnGroundEnemy();
    }
  }

  function spawnSpike(){
    // bucket sprite is 433x454 (roughly square, slightly taller than wide)
    const w = 32 + Math.random()*12;
    const h = w * (454/433);
    obstacles.push({
      type:'spike', x: W + 40, y: groundY - h, w: w, h: h
    });
  }
  function spawnPit(){
    const w = 90 + Math.random()*70 + Math.min(currentScore()*0.05, 60);
    obstacles.push({
      type:'pit', x: W + 40, y: groundY, w: w, h: H - groundY
    });
  }
  function spawnFlyer(){
    const w = 52, h = w * (235/371); // basket sprite aspect ratio
    const baseY = groundY - 70 - Math.random()*100 - h;
    obstacles.push({
      type:'flyer', x: W + 40, y: baseY, w: w, h: h,
      amp: 18 + Math.random()*22, freq: 1.4 + Math.random()*1.2, t0: elapsed, baseY: baseY
    });
  }
  function spawnGroundEnemy(){
    // coach: clearly larger than the player (PLAYER_H = 58) in both height and width
    const h = 118, w = h * (157/384); // coach sprite aspect ratio
    obstacles.push({
      type:'ground', x: W + 40, y: groundY - h, w: w, h: h, bob: Math.random()*Math.PI*2
    });
  }

  function nextSpawnInterval(){
    const score = currentScore();
    const stage = difficultyStage(score);
    const base = [ [1.15,1.6], [0.95,1.35], [0.8,1.15], [0.62,0.95] ][stage];
    return base[0] + Math.random()*(base[1]-base[0]);
  }

  // ---------------------------------------------------------------
  // Particles (juice)
  // ---------------------------------------------------------------
  function spawnParticles(x,y,n,kind){
    for(let i=0;i<n;i++){
      particles.push({
        x, y, vx:(Math.random()-0.5)*160, vy:-Math.random()*160,
        life:0.5+Math.random()*0.3, age:0,
        color: kind==='jump' ? 'rgba(46,230,214,0.9)' : 'rgba(255,46,136,0.9)'
      });
    }
  }

  // ---------------------------------------------------------------
  // Update
  // ---------------------------------------------------------------
  function update(dt){
    elapsed += dt;

    if(state === 'playing'){
      // difficulty ramp
      const score = currentScore();
      scrollSpeed = Math.min(MAX_SPEED, BASE_SPEED + score*0.55);

      distance += scrollSpeed * dt;
      bgOffset += scrollSpeed * dt * 0.5;

      // horizontal move (smooth)
      const minX = 10, maxX = W*0.72 - player.w;
      targetX = Math.max(minX, Math.min(maxX, targetX));
      player.x += (targetX - player.x) * Math.min(1, dt*3.2);

      // vertical physics
      player.vy += GRAVITY * dt;
      player.y += player.vy * dt;

      // require solid footing over the pit before committing to a fall: if the
      // character is only barely grazing the edge (mostly still on solid ground),
      // it should not drop in. PIT_FORGIVENESS shrinks the effective hitbox used
      // for this check on both sides of the player.
      const PIT_FORGIVENESS = player.w * 0.42;
      const overPit = obstacles.some(o => o.type==='pit' &&
        player.x + player.w - PIT_FORGIVENESS > o.x &&
        player.x + PIT_FORGIVENESS < o.x + o.w);

      if(player.falling){
        // already committed to falling through a pit
        player.grounded = false;
        if(player.y > H + 100){
          takeDamage();
          if(state !== 'playing') return;
          // survived: climb back out just past the pit that caused the fall, briefly invulnerable
          player.falling = false;
          player.grounded = true;
          player.vy = 0;
          player.y = groundY - player.h;
          player.jumpsUsed = 0;
          for(const o of obstacles){
            if(o.type === 'pit' && player.x + player.w > o.x && player.x < o.x + o.w){
              player.x = o.x + o.w + 14;
            }
          }
          targetX = Math.max(targetX, player.x);
        }
      } else if(overPit && player.y + player.h >= groundY - 2){
        // contacted the pit (even just its wall) while at ground level: commit to falling, no recovery
        player.falling = true;
        player.grounded = false;
      } else if(!overPit){
        if(player.y + player.h >= groundY){
          player.y = groundY - player.h;
          player.vy = 0;
          if(!player.grounded){ player.squash = 6; }
          player.grounded = true;
          player.jumpsUsed = 0;
        }
      } else {
        // over a pit but still airborne above ground level (jumping over it): keep falling naturally
        player.grounded = false;
      }

      if(player.squash > 0) player.squash -= dt*20;

      // cleaning sparkle trail: appears at the rag while wiping along the ground
      sparkleTimer -= dt;
      if(player.grounded && !overPit && sparkleTimer <= 0){
        sparkleTimer = 0.05;
        const ragX = player.x + player.w*0.8;
        const ragY = groundY - 4;
        particles.push({
          x: ragX + (Math.random()-0.5)*10, y: ragY,
          vx: -30 - Math.random()*40, vy: -40 - Math.random()*40,
          life: 0.35 + Math.random()*0.2, age: 0,
          color: 'rgba(255,255,255,0.9)'
        });
      }

      // spawn
      spawnTimer -= dt;
      if(spawnTimer <= 0){
        spawnObstacle();
        spawnTimer = nextSpawnInterval();
      }

      // move obstacles + collision
      for(let i = obstacles.length-1; i>=0; i--){
        const o = obstacles[i];
        o.x -= scrollSpeed * dt;
        if(o.type === 'flyer'){
          o.y = o.baseY + Math.sin((elapsed - o.t0)*o.freq)*o.amp;
        }
        if(o.type === 'ground'){
          o.bob += dt*8;
        }
        if(o.x + o.w < -60){ obstacles.splice(i,1); continue; }

        if(o.type !== 'pit'){
          if(rectsOverlap(player, o)){
            takeDamage();
            obstacles.splice(i,1);
            if(state !== 'playing') return;
          }
        }
      }

      // particles
      for(let i=particles.length-1;i>=0;i--){
        const p = particles[i];
        p.age += dt;
        if(p.age > p.life){ particles.splice(i,1); continue; }
        p.x += p.vx*dt; p.y += p.vy*dt; p.vy += GRAVITY*0.5*dt;
      }

      document.getElementById('score-val').textContent = score;
    } else {
      bgOffset += 40*dt;
      for(let i=particles.length-1;i>=0;i--){
        const p = particles[i];
        p.age += dt;
        if(p.age > p.life){ particles.splice(i,1); continue; }
        p.x += p.vx*dt; p.y += p.vy*dt; p.vy += GRAVITY*0.5*dt;
      }
    }

    if(flashTimer > 0) flashTimer -= dt;
    if(invulnTimer > 0) invulnTimer -= dt;
  }

  function rectsOverlap(a,b){
    const pad = 6; // slight forgiveness
    return a.x+pad < b.x+b.w && a.x+a.w-pad > b.x &&
           a.y+pad < b.y+b.h && a.y+a.h-pad > b.y;
  }

  // ---------------------------------------------------------------
  // Draw
  // ---------------------------------------------------------------
  function draw(){
    ctx.clearRect(0,0,W,H);

    // hallway background photo, tiled with slow parallax so it reads as a long corridor
    drawHallwayPhoto(groundY);

    // ---- floor: constant wood-plank color; grime sits ON TOP and gets wiped away ----
    const cleanEdge = (state === 'playing') ? (player.x + player.w*0.82) : W * 0.3;

    // wood base
    ctx.fillStyle = '#d8ab72';
    ctx.fillRect(0, groundY, W, H-groundY);
    // plank seams
    ctx.strokeStyle = 'rgba(150,104,54,0.45)';
    ctx.lineWidth = 1;
    const plank = 46;
    const poff = bgOffset % plank;
    for(let x = -poff; x < W; x += plank){
      ctx.beginPath();
      ctx.moveTo(x, groundY);
      ctx.lineTo(x, H);
      ctx.stroke();
    }
    // subtle wood grain
    ctx.strokeStyle = 'rgba(150,104,54,0.18)';
    for(let y = groundY+10; y < H; y += 14){
      ctx.beginPath();
      ctx.moveTo(0,y);
      ctx.lineTo(W,y);
      ctx.stroke();
    }

    // grime overlay: dust + smudges, only where not yet cleaned
    ctx.save();
    ctx.beginPath();
    ctx.rect(Math.max(0,cleanEdge), groundY, Math.max(0, W-cleanEdge), H-groundY);
    ctx.clip();
    ctx.fillStyle = 'rgba(90,68,40,0.32)';
    const speck = 24;
    const soff = bgOffset % speck;
    for(let x = -soff; x < W; x += speck){
      for(let y = groundY+8; y < H; y += 20){
        if(((x+y)|0) % 37 < 11){
          ctx.fillRect(x, y, 4, 3);
        }
      }
    }
    ctx.fillStyle = 'rgba(70,52,30,0.22)';
    const smud = 70;
    const smoff = bgOffset % smud;
    for(let x = -smoff; x < W; x += smud){
      if(((x)|0) % 140 < 70){
        ctx.beginPath();
        ctx.ellipse(x+20, groundY + 18 + ((x*7)%18), 14, 6, 0.3, 0, Math.PI*2);
        ctx.fill();
      }
    }
    ctx.restore();

    // mop line marking the just-cleaned boundary
    if(state === 'playing' && cleanEdge > 0 && cleanEdge < W){
      ctx.strokeStyle = 'rgba(255,255,255,0.55)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cleanEdge, groundY+2);
      ctx.lineTo(cleanEdge, H);
      ctx.stroke();
    }

    // ground top edge line
    ctx.beginPath();
    ctx.moveTo(0, groundY+0.5);
    ctx.lineTo(W, groundY+0.5);
    ctx.strokeStyle = 'rgba(120,84,40,0.7)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // obstacles
    obstacles.forEach(o => drawObstacle(o));

    // player
    drawPlayer();

    // particles
    particles.forEach(p => {
      ctx.globalAlpha = Math.max(0, 1 - p.age/p.life);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    if(flashTimer > 0){
      ctx.fillStyle = 'rgba(255,46,136,'+(flashTimer*0.6).toFixed(2)+')';
      ctx.fillRect(0,0,W,H);
    }
  }

  function drawHallwayPhoto(groundY){
    ctx.save();
    // scale the photo to cover full canvas height above the floor, tile it
    // horizontally with a slow parallax scroll so it reads as a long corridor
    if(hallwayBgReady){
      const iw = hallwayBgImg.naturalWidth || hallwayBgImg.width;
      const ih = hallwayBgImg.naturalHeight || hallwayBgImg.height;
      const drawH = groundY;
      const drawW = drawH * (iw / ih);
      const off = (bgOffset * 0.3) % drawW;
      for(let x = -off - drawW; x < W + drawW; x += drawW){
        ctx.drawImage(hallwayBgImg, x, 0, drawW, drawH);
      }
    } else {
      ctx.fillStyle = '#cdeadd';
      ctx.fillRect(0, 0, W, groundY);
    }

    // decorative accents, sized to roughly match the classroom door height in the
    // background art so they read as part of the scene rather than tiny stickers
    const doorH = groundY * 0.8;
    const cycle = W * 1.15;
    const off2 = bgOffset * 0.4 % cycle;
    for(let i=-1; i<3; i++){
      const baseX = i*cycle - off2;
      const segIndex = Math.round((baseX + off2) / cycle);
      const m3 = ((segIndex % 3) + 3) % 3;

      if(decoGirlsReady && m3 === 0){
        const gh = doorH * 0.92, gw = gh * (382/400);
        ctx.globalAlpha = 0.95;
        ctx.drawImage(decoGirlsImg, baseX + cycle*0.22, groundY - gh, gw, gh);
        ctx.globalAlpha = 1;
      } else if(decoBoyReady && m3 === 1){
        const bh = doorH * 0.92, bw = bh * (302/400);
        ctx.globalAlpha = 0.95;
        ctx.drawImage(decoBoyImg, baseX + cycle*0.3, groundY - bh, bw, bh);
        ctx.globalAlpha = 1;
      } else if(decoBoyGirlReady && m3 === 2){
        const sh = doorH * 0.8, sw = sh; // near-square scene
        ctx.globalAlpha = 0.95;
        ctx.drawImage(decoBoyGirlImg, baseX + cycle*0.26, groundY - sh, sw, sh);
        ctx.globalAlpha = 1;
      }
    }
    ctx.restore();
  }

  function drawPlayer(){
    // brief flicker while invulnerable right after taking a hit
    if(invulnTimer > 0 && Math.floor(invulnTimer * 14) % 2 === 0) return;
    ctx.save();
    const squash = Math.max(0, player.squash)/6;
    const cx = player.x + player.w/2;
    const cy = player.y + player.h/2;
    ctx.translate(cx,cy);
    ctx.scale(1 + squash*0.15, 1 - squash*0.15);
    ctx.translate(-cx,-cy);

    // soft ground shadow to keep the character readable on the wood floor
    ctx.save();
    ctx.globalAlpha = 0.22;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(cx, Math.min(player.y+player.h, groundY)+4, player.w*0.4, 6, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    if(playerImgReady){
      ctx.drawImage(playerImg, player.x, player.y, player.w, player.h);
    } else {
      // fallback while the image is still loading
      ctx.fillStyle = '#2ee6d6';
      roundRect(ctx, player.x, player.y, player.w, player.h, 8);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawObstacle(o){
    ctx.save();
    if(o.type === 'spike'){
      // ground hazard: a bucket left in the hallway, instead of a red spike
      ctx.shadowColor = 'rgba(0,0,0,0.25)';
      ctx.shadowBlur = 6;
      if(bucketImgReady){
        ctx.drawImage(bucketImg, o.x, o.y, o.w, o.h);
      } else {
        ctx.fillStyle = '#b7b7c2';
        roundRect(ctx, o.x, o.y, o.w, o.h, 6);
        ctx.fill();
      }
    } else if(o.type === 'pit'){
      // dark void, clearly distinct from the light floor
      ctx.fillStyle = '#08050f';
      ctx.fillRect(o.x, o.y, o.w, o.h);
      // hazard stripe strip along the top edge for visibility
      const stripeH = 7;
      ctx.save();
      ctx.beginPath();
      ctx.rect(o.x, o.y, o.w, stripeH);
      ctx.clip();
      ctx.fillStyle = '#1a1206';
      ctx.fillRect(o.x, o.y, o.w, stripeH);
      ctx.fillStyle = '#ffcc33';
      const stripeW = 12;
      const sOff = (elapsed*40) % (stripeW*2);
      for(let sx = o.x - stripeW*2 + sOff; sx < o.x+o.w+stripeW; sx += stripeW*2){
        ctx.beginPath();
        ctx.moveTo(sx, o.y+stripeH);
        ctx.lineTo(sx+stripeW, o.y+stripeH);
        ctx.lineTo(sx+stripeW*2, o.y);
        ctx.lineTo(sx+stripeW, o.y);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
      ctx.strokeStyle = 'rgba(255,46,136,0.7)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(o.x,o.y+0.5); ctx.lineTo(o.x+o.w,o.y+0.5);
      ctx.stroke();
    } else if(o.type === 'flyer'){
      const wob = Math.sin(elapsed*10)*4;
      ctx.save();
      ctx.shadowColor = 'rgba(255,179,71,0.6)';
      ctx.shadowBlur = 10;
      if(flyerImgReady){
        ctx.translate(o.x+o.w/2, o.y+o.h/2+wob);
        ctx.rotate(Math.sin(elapsed*6)*0.08);
        ctx.drawImage(flyerImg, -o.w/2, -o.h/2, o.w, o.h);
      } else {
        ctx.fillStyle = '#ffb347';
        roundRect(ctx, o.x, o.y, o.w, o.h, 10);
        ctx.fill();
      }
      ctx.restore();
    } else if(o.type === 'ground'){
      const bob = Math.sin(o.bob)*3;
      ctx.save();
      ctx.shadowColor = 'rgba(194,59,255,0.5)';
      ctx.shadowBlur = 8;
      if(groundEnemyImgReady){
        ctx.drawImage(groundEnemyImg, o.x, o.y+bob, o.w, o.h);
      } else {
        ctx.fillStyle = '#c23bff';
        roundRect(ctx, o.x, o.y+bob, o.w, o.h, 8);
        ctx.fill();
      }
      ctx.restore();
    }
    ctx.restore();
  }

  function roundRect(c,x,y,w,h,r){
    c.beginPath();
    c.moveTo(x+r,y);
    c.arcTo(x+w,y,x+w,y+h,r);
    c.arcTo(x+w,y+h,x,y+h,r);
    c.arcTo(x,y+h,x,y,r);
    c.arcTo(x,y,x+w,y,r);
    c.closePath();
  }

  // ---------------------------------------------------------------
  // Flow control
  // ---------------------------------------------------------------
  const startScreen = document.getElementById('start-screen');
  const gameoverScreen = document.getElementById('gameover-screen');
  const startBtn = document.getElementById('start-btn');
  const retryBtn = document.getElementById('retry-btn');
  const shareBtn = document.getElementById('share-btn');
  const submitBtn = document.getElementById('submit-score-btn');
  const nameInput = document.getElementById('name-input');
  const submitStatus = document.getElementById('submit-status');
  const finalScoreEl = document.getElementById('final-score');
  const newbestTag = document.getElementById('newbest-tag');
  const bestValEl = document.getElementById('best-val');
  const hpHeartsEl = document.getElementById('hp-hearts');

  let lastRunScore = 0;
  let lastRunTs = null;
  let hasSubmitted = false;

  async function beginGame(){
    startScreen.classList.add('hidden');
    gameoverScreen.classList.add('hidden');
    resetGame();
    state = 'playing';
  }

  function triggerGameOver(){
    if(state !== 'playing') return;
    state = 'dead';
    flashTimer = 1;
    spawnParticles(player.x+player.w/2, player.y+player.h/2, 18, 'hit');
    lastRunScore = currentScore();
    hasSubmitted = false;

    const isNewBest = lastRunScore > (memCache.best || 0);
    if(isNewBest) savePersonalBest(lastRunScore);
    bestValEl.textContent = memCache.best || lastRunScore;

    finalScoreEl.textContent = lastRunScore;
    newbestTag.classList.toggle('hidden', !isNewBest);
    nameInput.value = memCache.name || '';
    submitStatus.textContent = '';
    submitBtn.disabled = false;
    submitBtn.textContent = '登録';

    setTimeout(async () => {
      gameoverScreen.classList.remove('hidden');
      const list = await loadLeaderboard();
      renderBoard(document.getElementById('gameover-board'), list, null);
    }, 550);
  }

  startBtn.addEventListener('click', beginGame);
  retryBtn.addEventListener('click', beginGame);

  submitBtn.addEventListener('click', async () => {
    if(hasSubmitted) return;
    const name = (nameInput.value || '').trim().slice(0,10) || '名無しさん';
    submitBtn.disabled = true;
    submitBtn.textContent = '登録中...';
    await savePersonalName(name);
    const ts = Date.now();
    lastRunTs = ts;
    let list = await loadLeaderboard();
    list.push({name, score:lastRunScore, ts});
    list.sort((a,b)=>b.score-a.score);
    list = list.slice(0,20);
    await saveLeaderboard(list);
    hasSubmitted = true;
    submitBtn.textContent = '登録済み';
    submitStatus.textContent = 'ランキングに登録しました！';
    renderBoard(document.getElementById('gameover-board'), list, ts);
  });

  shareBtn.addEventListener('click', () => {
    const text = `クリーンランナーで ${lastRunScore}m 走った！ #クリーンランナー`;
    const url = window.location.href;
    const intent = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text) + '&url=' + encodeURIComponent(url);
    window.open(intent, '_blank', 'noopener');
  });

  // ---------------------------------------------------------------
  // Main loop
  // ---------------------------------------------------------------
  let lastT = performance.now();
  function frame(t){
    let dt = (t - lastT) / 1000;
    lastT = t;
    dt = Math.min(dt, 0.033); // clamp for tab-switch spikes
    update(dt);
    draw();
    requestAnimationFrame(frame);
  }

  // ---------------------------------------------------------------
  // Init
  // ---------------------------------------------------------------
  async function init(){
    resize();
    player = { x:90, y:groundY-PLAYER_H, vy:0, w:PLAYER_W, h:PLAYER_H, grounded:true, squash:0, falling:false, jumpsUsed:0 };
    obstacles = []; particles = [];
    await loadPersonal();
    bestValEl.textContent = memCache.best || 0;
    const list = await loadLeaderboard();
    renderBoard(document.getElementById('start-board'), list, null);
    requestAnimationFrame(frame);
  }
  init();
})();
</script>
